<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="K&J Caribbean Instagram Logo">
  <!-- Instagram-optimized: 1080×1080px square -->
  <defs>
    <linearGradient id="bgIG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#062E2E"/>
      <stop offset="50%"  stop-color="#0A6E6E"/>
      <stop offset="100%" stop-color="#0D9B9B"/>
    </linearGradient>
    <linearGradient id="sunIG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4C430"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <clipPath id="roundedIG">
      <rect x="40" y="40" width="1000" height="1000" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1080" height="1080" rx="0" fill="#FFF5E6"/>
  <rect x="40" y="40" width="1000" height="1000" rx="200" fill="url(#bgIG)"/>

  <!-- Dot pattern -->
  <g clip-path="url(#roundedIG)" opacity="0.07">
    <rect x="40" y="40" width="1000" height="1000" fill="none"/>
    <!-- Manual dots pattern approximation -->
    <circle cx="120" cy="120" r="4" fill="white"/>
    <circle cx="180" cy="120" r="4" fill="white"/>
    <circle cx="240" cy="120" r="4" fill="white"/>
    <circle cx="300" cy="120" r="4" fill="white"/>
    <circle cx="360" cy="120" r="4" fill="white"/>
    <circle cx="420" cy="120" r="4" fill="white"/>
    <circle cx="480" cy="120" r="4" fill="white"/>
    <circle cx="540" cy="120" r="4" fill="white"/>
    <circle cx="600" cy="120" r="4" fill="white"/>
    <circle cx="660" cy="120" r="4" fill="white"/>
    <circle cx="720" cy="120" r="4" fill="white"/>
    <circle cx="780" cy="120" r="4" fill="white"/>
    <circle cx="840" cy="120" r="4" fill="white"/>
    <circle cx="900" cy="120" r="4" fill="white"/>
    <circle cx="960" cy="120" r="4" fill="white"/>
  </g>

  <!-- Sun -->
  <g clip-path="url(#roundedIG)">
    <!-- Sun rays -->
    <g transform="translate(540,380)" opacity="0.2">
      <line x1="0" y1="-320" x2="0" y2="-180" stroke="#F4C430" stroke-width="6"/>
      <line x1="226" y1="-226" x2="128" y2="-128" stroke="#F4C430" stroke-width="6"/>
      <line x1="320" y1="0" x2="180" y2="0" stroke="#F4C430" stroke-width="6"/>
      <line x1="226" y1="226" x2="128" y2="128" stroke="#F4C430" stroke-width="6"/>
      <line x1="-226" y1="-226" x2="-128" y2="-128" stroke="#F4C430" stroke-width="6"/>
      <line x1="-320" y1="0" x2="-180" y2="0" stroke="#F4C430" stroke-width="6"/>
      <line x1="-226" y1="226" x2="-128" y2="128" stroke="#F4C430" stroke-width="6"/>
      <line x1="0" y1="320" x2="0" y2="180" stroke="#F4C430" stroke-width="6"/>
      <line x1="120" y1="-300" x2="68" y2="-170" stroke="#F4C430" stroke-width="4"/>
      <line x1="-120" y1="-300" x2="-68" y2="-170" stroke="#F4C430" stroke-width="4"/>
      <line x1="300" y1="-120" x2="170" y2="-68" stroke="#F4C430" stroke-width="4"/>
      <line x1="300" y1="120" x2="170" y2="68" stroke="#F4C430" stroke-width="4"/>
      <line x1="-300" y1="-120" x2="-170" y2="-68" stroke="#F4C430" stroke-width="4"/>
      <line x1="-300" y1="120" x2="-170" y2="68" stroke="#F4C430" stroke-width="4"/>
    </g>

    <!-- Sun circle -->
    <circle cx="540" cy="380" r="100" fill="url(#sunIG)" opacity="0.85"/>
    <circle cx="540" cy="380" r="78" fill="#F4C430" opacity="0.65"/>

    <!-- Palm left -->
    <g transform="translate(200,680)">
      <path d="M25 280 Q28 200 22 120 Q18 65 25 0" stroke="#D4A017" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.55"/>
      <path d="M25,10 Q-15,-20 -55,-50 Q-28,-35 0,-10 Z" fill="#3A9A5C" opacity="0.6"/>
      <path d="M25,10 Q5,-40 -5,-80 Q12,-48 22,-12 Z" fill="#3A9A5C" opacity="0.6"/>
      <path d="M25,10 Q65,-20 100,-45 Q72,-30 30,-8 Z" fill="#3A9A5C" opacity="0.6"/>
    </g>

    <!-- Palm right -->
    <g transform="translate(880,680) scale(-1,1)">
      <path d="M25 280 Q28 200 22 120 Q18 65 25 0" stroke="#D4A017" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.55"/>
      <path d="M25,10 Q-15,-20 -55,-50 Q-28,-35 0,-10 Z" fill="#3A9A5C" opacity="0.6"/>
      <path d="M25,10 Q5,-40 -5,-80 Q12,-48 22,-12 Z" fill="#3A9A5C" opacity="0.6"/>
      <path d="M25,10 Q65,-20 100,-45 Q72,-30 30,-8 Z" fill="#3A9A5C" opacity="0.6"/>
    </g>

    <!-- Waves -->
    <path d="M 40 830 Q 160 800 280 820 Q 400 840 520 820 Q 640 800 760 820 Q 880 840 1000 820 Q 1030 815 1040 820 L1040 1040 L40 1040 Z" fill="#074A4A" opacity="0.7"/>
    <path d="M 40 870 Q 200 840 360 865 Q 520 890 680 865 Q 840 840 1000 865 L1040 865 L1040 1040 L40 1040 Z" fill="#062E2E" opacity="0.85"/>

    <!-- Gold border -->
    <rect x="60" y="60" width="960" height="960" rx="180" fill="none" stroke="#D4A017" stroke-width="8"/>
    <rect x="80" y="80" width="920" height="920" rx="165" fill="none" stroke="#D4A017" stroke-width="2" stroke-dasharray="14 10" opacity="0.6"/>

    <!-- CARIBBEAN label top -->
    <text x="540" y="220"
          text-anchor="middle"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="52" font-weight="700"
          fill="#D4A017" letter-spacing="22">CARIBBEAN</text>

    <!-- K&J main text -->
    <text x="540" y="640"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="260" font-weight="900"
          fill="#FFFFFF" letter-spacing="-8">K&amp;J</text>

    <!-- Gold stroke on K&J -->
    <text x="540" y="640"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="260" font-weight="900"
          fill="none" stroke="#D4A017" stroke-width="2"
          letter-spacing="-8" opacity="0.25">K&amp;J</text>

    <!-- MARKET & RESTAURANT -->
    <text x="540" y="710"
          text-anchor="middle"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="36" font-weight="600"
          fill="rgba(255,255,255,.7)" letter-spacing="10">MARKET &amp; RESTAURANT</text>

    <!-- Stars -->
    <text x="200" y="660" text-anchor="middle" font-size="36" fill="#D4A017" opacity="0.85">★</text>
    <text x="880" y="660" text-anchor="middle" font-size="36" fill="#D4A017" opacity="0.85">★</text>

    <!-- TAMPA · FL -->
    <text x="540" y="810"
          text-anchor="middle"
          font-family="Arial, sans-serif"
          font-size="28" font-weight="600"
          fill="rgba(255,255,255,.5)" letter-spacing="14">TAMPA · FL</text>
  </g>
</svg>
